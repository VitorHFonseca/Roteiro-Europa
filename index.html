<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>Mochilão Europa — App Final</title>
  <link rel="manifest" href="./manifest.json?v=final-2">
  <link rel="stylesheet" href="./assets/css/style.css?v=final-2">
  <link rel="icon" href="./assets/icons/icon.svg?v=final-2">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <header class="hero" id="home">
    <div class="hero-card">
      <span class="pill">✅ VERSÃO FINAL ATIVA • LOCALSTORAGE • GITHUB PAGES</span>
      <h1>Mochilão Europa</h1>
      <p>Aplicativo completo offline para planejar roteiro, mapa, orçamento, checklist, diário e exportar PDF.</p>
      <div class="actions">
        <button class="primary" id="openApp">Abrir aplicativo</button>
        <button class="secondary" id="loadDemo">Carregar exemplo</button>
      </div>
      <small class="version">Versão final 2.0 — se você está vendo esta tela, a atualização funcionou.</small>
    </div>
  </header>

  <main class="app hidden" id="app">
    <aside>
      <div class="logo">🌍 <strong>Mochilão Europa</strong></div>
      <button class="nav active" data-page="dashboard">Dashboard</button>
      <button class="nav" data-page="route">Roteiro</button>
      <button class="nav" data-page="map">Mapa</button>
      <button class="nav" data-page="budget">Orçamento</button>
      <button class="nav" data-page="checklist">Checklist</button>
      <button class="nav" data-page="diary">Diário</button>
      <button class="nav" data-page="settings">Configurações</button>
      <button class="nav export" id="pdfBtn">Exportar PDF</button>
    </aside>

    <section class="content">
      <div class="top">
        <div>
          <span class="pill dark">App offline</span>
          <h2 id="title">Dashboard</h2>
        </div>
        <button class="secondary" id="backHome">Voltar ao início</button>
      </div>

      <div id="view"></div>
    </section>
  </main>

  <div id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="./assets/js/app.js?v=final-2"></script>
</body>
</html>
