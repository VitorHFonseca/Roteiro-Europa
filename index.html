<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="Planejador offline para mochilão pela Europa." />
  <title>Mochilão Europa</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="assets/css/style.css" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQbkERJvOjQm0T8nVFhnbbJCq9g2Q4c="
    crossorigin=""
  />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🌍</div>
        <div>
          <strong>Mochilão Europa</strong>
          <span>Planner offline</span>
        </div>
      </div>

      <nav class="nav" aria-label="Menu principal">
        <button class="nav-link active" data-view="dashboard">Dashboard</button>
        <button class="nav-link" data-view="planner">Roteiro</button>
        <button class="nav-link" data-view="map">Mapa</button>
        <button class="nav-link" data-view="budget">Orçamento</button>
        <button class="nav-link" data-view="checklist">Checklist</button>
        <button class="nav-link" data-view="diary">Diário</button>
        <button class="nav-link" data-view="settings">Configurações</button>
      </nav>

      <div class="sidebar-footer">
        <button id="installPwaBtn" class="ghost-btn hidden">Instalar app</button>
        <small>Dados salvos apenas neste navegador.</small>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Viagem</p>
          <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="top-actions">
          <button id="exportPdfBtn" class="primary-btn">Exportar PDF</button>
          <button id="sampleDataBtn" class="secondary-btn">Carregar exemplo</button>
        </div>
      </header>

      <section id="dashboardView" class="view active"></section>
      <section id="plannerView" class="view"></section>
      <section id="mapView" class="view"></section>
      <section id="budgetView" class="view"></section>
      <section id="checklistView" class="view"></section>
      <section id="diaryView" class="view"></section>
      <section id="settingsView" class="view"></section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin="">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
